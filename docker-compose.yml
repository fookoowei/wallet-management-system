services:
  db:
    image: postgres:16
    container_name: wallet_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - wallet_pgdata:/var/lib/postgresql/data

volumes:
  wallet_pgdata:
